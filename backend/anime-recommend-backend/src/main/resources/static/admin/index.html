<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动漫推荐系统 - 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        
        /* 侧边栏 */
        .sidebar {
            position: fixed; left: 0; top: 0; width: 240px; height: 100vh;
            background: linear-gradient(180deg, #f03d6d 0%, #d63384 100%);
            color: white; padding: 20px 0;
        }
        .sidebar-header { padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h1 { font-size: 20px; font-weight: 600; }
        .sidebar-header p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
        .nav-menu { padding: 20px 0; }
        .nav-item { display: block; padding: 12px 20px; color: white; text-decoration: none;
                    cursor: pointer; transition: background 0.2s; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); }
        .nav-item i { margin-right: 10px; width: 20px; text-align: center; }
        
        /* 主内容区 */
        .main-content { margin-left: 240px; padding: 20px; min-height: 100vh; }
        .page-header { display: flex; justify-content: space-between; align-items: center;
                       margin-bottom: 20px; }
        .page-title { font-size: 24px; font-weight: 600; color: #333; }
        
        /* 统计卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                      gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-card .label { font-size: 14px; color: #666; }
        .stat-card .value { font-size: 32px; font-weight: 700; color: #333; margin: 8px 0; }
        .stat-card .trend { font-size: 12px; }
        .stat-card .trend.up { color: #52c41a; }
        .stat-card .trend.down { color: #f5222d; }
        
        /* 数据表格 */
        .data-card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
                     margin-bottom: 20px; }
        .card-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0;
                       display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-size: 16px; font-weight: 600; color: #333; }
        .card-body { padding: 20px; }
        
        /* 表格 */
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { font-weight: 600; color: #666; font-size: 13px; }
        td { color: #333; font-size: 14px; }
        tr:hover { background: #fafafa; }
        
        /* 按钮 */
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer;
               font-size: 14px; transition: all 0.2s; }
        .btn-primary { background: #f03d6d; color: white; }
        .btn-primary:hover { background: #d63384; }
        .btn-secondary { background: #f0f0f0; color: #666; }
        .btn-secondary:hover { background: #e0e0e0; }
        .btn-danger { background: #fff1f0; color: #f5222d; }
        .btn-danger:hover { background: #ffccc7; }
        .btn-sm { padding: 4px 8px; font-size: 12px; }
        
        /* 表单 */
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 14px; color: #666; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px;
                      font-size: 14px; transition: border-color 0.2s; }
        .form-input:focus { outline: none; border-color: #f03d6d; }
        select.form-input { cursor: pointer; }
        
        /* 模态框 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                         background: rgba(0,0,0,0.5); display: none; justify-content: center;
                         align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 12px; width: 500px; max-width: 90%;
                 max-height: 90vh; overflow-y: auto; }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0;
                        display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 18px; font-weight: 600; }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer;
                       color: #999; }
        .modal-body { padding: 20px; }
        .modal-footer { padding: 16px 20px; border-top: 1px solid #f0f0f0;
                        display: flex; justify-content: flex-end; gap: 10px; }
        
        /* 状态标签 */
        .status-tag { padding: 4px 10px; border-radius: 12px; font-size: 12px; }
        .status-ongoing { background: #e6f7ff; color: #1890ff; }
        .status-completed { background: #f6ffed; color: #52c41a; }
        .status-planned { background: #fff7e6; color: #fa8c16; }
        
        /* 分页 */
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
        .pagination button { padding: 8px 12px; border: 1px solid #ddd; background: white;
                            border-radius: 6px; cursor: pointer; }
        .pagination button.active { background: #f03d6d; color: white; border-color: #f03d6d; }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* 搜索栏 */
        .search-bar { display: flex; gap: 10px; margin-bottom: 16px; }
        .search-bar input { flex: 1; max-width: 300px; }
        
        /* 隐藏的页面 */
        .page { display: none; }
        .page.active { display: block; }
        
        /* 登录页 */
        .login-container { display: flex; justify-content: center; align-items: center;
                           min-height: 100vh; background: linear-gradient(135deg, #f03d6d 0%, #d63384 100%); }
        .login-box { background: white; padding: 40px; border-radius: 16px; width: 400px;
                     box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .login-title { text-align: center; font-size: 24px; margin-bottom: 30px; color: #333; }
        
        /* Toast 提示 */
        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px;
                 color: white; z-index: 2000; animation: slideIn 0.3s ease; }
        .toast.success { background: #52c41a; }
        .toast.error { background: #f5222d; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <h2 class="login-title">动漫推荐系统管理后台</h2>
            <div class="form-group">
                <label class="form-label">管理员账号</label>
                <input type="text" id="loginUsername" class="form-input" placeholder="请输入管理员账号">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" id="loginPassword" class="form-input" placeholder="请输入密码">
            </div>
            <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="login()">登 录</button>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="mainApp" style="display: none;">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>📺 动漫管理系统</h1>
                <p>后台管理 v1.0</p>
            </div>
            <nav class="nav-menu">
                <a class="nav-item active" onclick="showPage('dashboard')">📊 数据看板</a>
                <a class="nav-item" onclick="showPage('anime')">🎬 动漫管理</a>
                <a class="nav-item" onclick="showPage('user')">👥 用户管理</a>
                <a class="nav-item" onclick="showPage('schedule')">📅 日程管理</a>
                <a class="nav-item" onclick="showPage('review')">💬 评论管理</a>
                <a class="nav-item" onclick="showPage('log')">📋 操作日志</a>
                <a class="nav-item" onclick="logout()" style="margin-top: auto;">🚪 退出登录</a>
            </nav>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 数据看板 -->
            <div id="dashboardPage" class="page active">
                <div class="page-header">
                    <h2 class="page-title">数据看板</h2>
                </div>
                <div class="stats-grid" id="dashboardStats"></div>
                <div class="data-card">
                    <div class="card-header">
                        <span class="card-title">🔥 热门动漫 TOP 5</span>
                    </div>
                    <div class="card-body">
                        <table id="hotAnimeTable"></table>
                    </div>
                </div>
            </div>

            <!-- 动漫管理 -->
            <div id="animePage" class="page">
                <div class="page-header">
                    <h2 class="page-title">动漫管理</h2>
                    <button class="btn btn-primary" onclick="showAnimeModal()">+ 添加动漫</button>
                </div>
                <div class="search-bar">
                    <input type="text" id="animeSearch" class="form-input" placeholder="搜索动漫名称...">
                    <select id="animeStatusFilter" class="form-input" style="width: 150px;">
                        <option value="">全部状态</option>
                        <option value="0">连载中</option>
                        <option value="1">已完结</option>
                    </select>
                    <button class="btn btn-secondary" onclick="loadAnimes()">搜索</button>
                </div>
                <div class="data-card">
                    <div class="card-body">
                        <table id="animeTable"></table>
                        <div class="pagination" id="animePagination"></div>
                    </div>
                </div>
            </div>

            <!-- 用户管理 -->
            <div id="userPage" class="page">
                <div class="page-header">
                    <h2 class="page-title">用户管理</h2>
                </div>
                <div class="search-bar">
                    <input type="text" id="userSearch" class="form-input" placeholder="搜索用户昵称...">
                    <button class="btn btn-secondary" onclick="loadUsers()">搜索</button>
                </div>
                <div class="data-card">
                    <div class="card-body">
                        <table id="userTable"></table>
                        <div class="pagination" id="userPagination"></div>
                    </div>
                </div>
            </div>

            <!-- 日程管理 -->
            <div id="schedulePage" class="page">
                <div class="page-header">
                    <h2 class="page-title">新番日程管理</h2>
                    <button class="btn btn-primary" onclick="showScheduleModal()">+ 添加日程</button>
                </div>
                <div class="data-card">
                    <div class="card-body">
                        <table id="scheduleTable"></table>
                        <div class="pagination" id="schedulePagination"></div>
                    </div>
                </div>
            </div>

            <!-- 评论管理 -->
            <div id="reviewPage" class="page">
                <div class="page-header">
                    <h2 class="page-title">评论管理</h2>
                </div>
                <div class="data-card">
                    <div class="card-body">
                        <table id="reviewTable"></table>
                        <div class="pagination" id="reviewPagination"></div>
                    </div>
                </div>
            </div>

            <!-- 操作日志 -->
            <div id="logPage" class="page">
                <div class="page-header">
                    <h2 class="page-title">操作日志</h2>
                    <button class="btn btn-danger" onclick="deleteOldLogs()">🗑️ 清理30天前日志</button>
                </div>
                <div class="data-card">
                    <div class="card-body">
                        <table id="logTable"></table>
                        <div class="pagination" id="logPagination"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 动漫编辑模态框 -->
    <div id="animeModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="animeModalTitle">添加动漫</span>
                <button class="modal-close" onclick="closeModal('animeModal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="animeId">
                <div class="form-group">
                    <label class="form-label">动漫名称 *</label>
                    <input type="text" id="animeTitle" class="form-input" placeholder="请输入动漫名称">
                </div>
                <div class="form-group">
                    <label class="form-label">封面图片URL</label>
                    <input type="text" id="animeCoverUrl" class="form-input" placeholder="https://example.com/cover.jpg">
                </div>
                <div class="form-group">
                    <label class="form-label">简介</label>
                    <textarea id="animeDescription" class="form-input" rows="3" placeholder="动漫简介..."></textarea>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label class="form-label">评分</label>
                        <input type="number" id="animeScore" class="form-input" step="0.1" min="0" max="10" placeholder="9.0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">集数</label>
                        <input type="number" id="animeEpisodeCount" class="form-input" min="0" placeholder="12">
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label class="form-label">状态</label>
                        <select id="animeStatus" class="form-input">
                            <option value="0">连载中</option>
                            <option value="1">已完结</option>
                            <option value="2">未开播</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">年份</label>
                        <input type="number" id="animeYear" class="form-input" placeholder="2024">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">标签 (逗号分隔)</label>
                    <input type="text" id="animeTags" class="form-input" placeholder="热血,战斗,奇幻">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('animeModal')">取消</button>
                <button class="btn btn-primary" onclick="saveAnime()">保存</button>
            </div>
        </div>
    </div>

    <!-- 日程编辑模态框 -->
    <div id="scheduleModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="scheduleModalTitle">添加日程</span>
                <button class="modal-close" onclick="closeModal('scheduleModal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="scheduleId">
                <div class="form-group">
                    <label class="form-label">动漫ID *</label>
                    <input type="number" id="scheduleAnimeId" class="form-input" placeholder="请输入动漫ID">
                </div>
                <div class="form-group">
                    <label class="form-label">集数</label>
                    <input type="number" id="scheduleEpisode" class="form-input" min="1" placeholder="1">
                </div>
                <div class="form-group">
                    <label class="form-label">播出时间</label>
                    <input type="datetime-local" id="scheduleAirTime" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">播出平台</label>
                    <input type="text" id="schedulePlatform" class="form-input" placeholder="Bilibili">
                </div>
                <div class="form-group">
                    <label class="form-label">平台链接</label>
                    <input type="text" id="schedulePlatformUrl" class="form-input" placeholder="https://...">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('scheduleModal')">取消</button>
                <button class="btn btn-primary" onclick="saveSchedule()">保存</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';  // 后端API基础路径
        let token = localStorage.getItem('adminToken');
        let currentPage = { anime: 0, user: 0, schedule: 0, review: 0, log: 0 };
        const pageSize = 10;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            if (token) {
                showMainApp();
            }
        });

        // 登录
        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showToast('请输入账号和密码', 'error');
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (data.code === 200 && data.data) {
                    token = data.data.token;
                    localStorage.setItem('adminToken', token);
                    showToast('登录成功', 'success');
                    showMainApp();
                } else {
                    showToast(data.message || '登录失败', 'error');
                }
            } catch (error) {
                console.error('登录失败', error);
                showToast('登录失败，请检查网络', 'error');
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('adminToken');
            token = null;
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('loginPage').style.display = 'flex';
        }

        // 显示主界面
        function showMainApp() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadDashboard();
        }

        // 显示页面
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(page + 'Page').classList.add('active');
            event.target.classList.add('active');
            
            // 加载对应页面数据
            switch(page) {
                case 'dashboard': loadDashboard(); break;
                case 'anime': loadAnimes(); break;
                case 'user': loadUsers(); break;
                case 'schedule': loadSchedules(); break;
                case 'review': loadReviews(); break;
                case 'log': loadLogs(); break;
            }
        }

        // API请求封装
        async function apiRequest(method, endpoint, data = null) {
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            };
            if (data) options.body = JSON.stringify(data);
            
            const response = await fetch(`${API_BASE}${endpoint}`, options);
            return response.json();
        }

        // 加载仪表盘
        async function loadDashboard() {
            try {
                const res = await apiRequest('GET', '/admin/dashboard');
                if (res.code === 200 && res.data) {
                    renderDashboardStats(res.data);
                    renderHotAnime(res.data.hotContents || []);
                }
            } catch (error) {
                console.error('加载仪表盘失败', error);
            }
        }

        // 渲染仪表盘统计
        function renderDashboardStats(data) {
            const cards = data.cards || {};
            document.getElementById('dashboardStats').innerHTML = `
                <div class="stat-card">
                    <div class="label">👥 总用户数</div>
                    <div class="value">${cards.totalUsers || 0}</div>
                    <div class="trend up">${data.trends?.userGrowth || ''}</div>
                </div>
                <div class="stat-card">
                    <div class="label">🎬 动漫总数</div>
                    <div class="value">${cards.totalAnimes || 0}</div>
                    <div class="trend">${cards.ongoingAnimes || 0} 部连载中</div>
                </div>
                <div class="stat-card">
                    <div class="label">💬 评论总数</div>
                    <div class="value">${cards.totalReviews || 0}</div>
                    <div class="trend">平均评分 ${cards.avgRating || '0.0'}</div>
                </div>
                <div class="stat-card">
                    <div class="label">📅 今日新增用户</div>
                    <div class="value">${cards.newUsersToday || 0}</div>
                </div>
            `;
        }

        // 渲染热门动漫
        function renderHotAnime(animes) {
            const tbody = animes.map(a => `
                <tr>
                    <td>${a.id}</td>
                    <td>${a.title}</td>
                    <td>⭐ ${a.score || 0}</td>
                    <td>🔥 ${a.heat || 0}</td>
                    <td><span class="status-tag ${a.status === 1 ? 'status-completed' : 'status-ongoing'}">${a.status === 1 ? '已完结' : '连载中'}</span></td>
                </tr>
            `).join('');
            document.getElementById('hotAnimeTable').innerHTML = `
                <thead><tr><th>ID</th><th>名称</th><th>评分</th><th>热度</th><th>状态</th></tr></thead>
                <tbody>${tbody}</tbody>
            `;
        }

        // 动漫管理
        async function loadAnimes(page = 0) {
            currentPage.anime = page;
            const search = document.getElementById('animeSearch').value;
            const status = document.getElementById('animeStatusFilter').value;
            
            let url = `/admin/anime/list?page=${page}&size=${pageSize}`;
            if (status) url += `&status=${status}`;
            
            try {
                const res = await apiRequest('GET', url);
                if (res.code === 200) {
                    renderAnimeTable(res.data || []);
                    renderPagination('anime', res.pages, res.currentPage);
                }
            } catch (error) {
                console.error('加载动漫失败', error);
            }
        }

        function renderAnimeTable(animes) {
            const tbody = animes.map(a => `
                <tr>
                    <td>${a.id}</td>
                    <td>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <img src="${a.coverUrl || 'https://via.placeholder.com/60x80'}" 
                                 style="width:40px;height:55px;border-radius:4px;object-fit:cover;">
                            <span>${a.title}</span>
                        </div>
                    </td>
                    <td>⭐ ${a.score || 0}</td>
                    <td>${a.episodeCount || 0}集</td>
                    <td><span class="status-tag ${a.status === 1 ? 'status-completed' : 'status-ongoing'}">${a.status === 1 ? '已完结' : a.status === 0 ? '连载中' : '未开播'}</span></td>
                    <td>
                        <button class="btn btn-sm btn-secondary" onclick="editAnime(${JSON.stringify(a).replace(/"/g, '&quot;')})">编辑</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteAnime(${a.id})">删除</button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('animeTable').innerHTML = `
                <thead><tr><th>ID</th><th>名称</th><th>评分</th><th>集数</th><th>状态</th><th>操作</th></tr></thead>
                <tbody>${tbody}</tbody>
            `;
        }

        function showAnimeModal(anime = null) {
            document.getElementById('animeModalTitle').textContent = anime ? '编辑动漫' : '添加动漫';
            document.getElementById('animeId').value = anime ? anime.id : '';
            document.getElementById('animeTitle').value = anime ? anime.title : '';
            document.getElementById('animeCoverUrl').value = anime ? anime.coverUrl || '' : '';
            document.getElementById('animeDescription').value = anime ? anime.description || '' : '';
            document.getElementById('animeScore').value = anime ? anime.score || '' : '';
            document.getElementById('animeEpisodeCount').value = anime ? anime.episodeCount || '' : '';
            document.getElementById('animeStatus').value = anime ? anime.status : 0;
            document.getElementById('animeYear').value = anime ? anime.releaseYear || '' : '';
            document.getElementById('animeTags').value = anime ? anime.tags || '' : '';
            document.getElementById('animeModal').classList.add('active');
        }

        function editAnime(anime) {
            showAnimeModal(anime);
        }

        async function saveAnime() {
            const id = document.getElementById('animeId').value;
            const data = {
                title: document.getElementById('animeTitle').value,
                coverUrl: document.getElementById('animeCoverUrl').value,
                description: document.getElementById('animeDescription').value,
                score: parseFloat(document.getElementById('animeScore').value) || null,
                episodeCount: parseInt(document.getElementById('animeEpisodeCount').value) || null,
                status: parseInt(document.getElementById('animeStatus').value),
                releaseYear: parseInt(document.getElementById('animeYear').value) || null,
                tags: document.getElementById('animeTags').value
            };
            
            try {
                let res;
                if (id) {
                    res = await apiRequest('PUT', `/admin/anime/${id}`, data);
                } else {
                    res = await apiRequest('POST', '/admin/anime/create', data);
                }
                
                if (res.code === 200) {
                    showToast(id ? '更新成功' : '添加成功', 'success');
                    closeModal('animeModal');
                    loadAnimes(currentPage.anime);
                } else {
                    showToast(res.message || '操作失败', 'error');
                }
            } catch (error) {
                showToast('操作失败', 'error');
            }
        }

        async function deleteAnime(id) {
            if (!confirm('确定要删除这部动漫吗？')) return;
            
            try {
                const res = await apiRequest('DELETE', `/admin/anime/${id}`);
                if (res.code === 200) {
                    showToast('删除成功', 'success');
                    loadAnimes(currentPage.anime);
                }
            } catch (error) {
                showToast('删除失败', 'error');
            }
        }

        // 用户管理
        async function loadUsers(page = 0) {
            currentPage.user = page;
            const search = document.getElementById('userSearch').value;
            
            let url = search 
                ? `/admin/user/search?keyword=${encodeURIComponent(search)}&page=${page}&size=${pageSize}`
                : `/admin/user/list?page=${page}&size=${pageSize}`;
            
            try {
                const res = await apiRequest('GET', url);
                if (res.code === 200) {
                    renderUserTable(res.data || []);
                    renderPagination('user', res.pages, res.currentPage);
                }
            } catch (error) {
                console.error('加载用户失败', error);
            }
        }

        function renderUserTable(users) {
            const tbody = users.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <img src="${u.avatarUrl || 'https://via.placeholder.com/40'}" 
                                 style="width:40px;height:40px;border-radius:50%;object-fit:cover;">
                            <span>${u.nickname || u.username || '未知'}</span>
                        </div>
                    </td>
                    <td>${u.openid ? '微信用户' : '普通用户'}</td>
                    <td>${u.createTime ? new Date(u.createTime).toLocaleDateString() : '-'}</td>
                    <td>
                        <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">删除</button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('userTable').innerHTML = `
                <thead><tr><th>ID</th><th>用户</th><th>类型</th><th>注册时间</th><th>操作</th></tr></thead>
                <tbody>${tbody}</tbody>
            `;
        }

        async function deleteUser(id) {
            if (!confirm('确定要删除这个用户吗？')) return;
            
            try {
                const res = await apiRequest('DELETE', `/admin/user/${id}`);
                if (res.code === 200) {
                    showToast('删除成功', 'success');
                    loadUsers(currentPage.user);
                }
            } catch (error) {
                showToast('删除失败', 'error');
            }
        }

        // 日程管理
        async function loadSchedules(page = 0) {
            currentPage.schedule = page;
            
            try {
                const res = await apiRequest('GET', `/admin/schedule/list?page=${page}&size=${pageSize}`);
                if (res.code === 200) {
                    renderScheduleTable(res.data || []);
                    renderPagination('schedule', res.pages, res.currentPage);
                }
            } catch (error) {
                console.error('加载日程失败', error);
            }
        }

        function renderScheduleTable(schedules) {
            const tbody = schedules.map(s => `
                <tr>
                    <td>${s.id}</td>
                    <td>动漫ID: ${s.animeId}</td>
                    <td>第 ${s.episode || 1} 集</td>
                    <td>${s.airTime ? new Date(s.airTime).toLocaleString() : '-'}</td>
                    <td>${s.platform || '-'}</td>
                    <td><span class="status-tag ${s.status === 1 ? 'status-completed' : 'status-ongoing'}">${s.status === 1 ? '已播' : '待播'}</span></td>
                    <td>
                        <button class="btn btn-sm btn-secondary" onclick="editSchedule(${JSON.stringify(s).replace(/"/g, '&quot;')})">编辑</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteSchedule(${s.id})">删除</button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('scheduleTable').innerHTML = `
                <thead><tr><th>ID</th><th>动漫</th><th>集数</th><th>播出时间</th><th>平台</th><th>状态</th><th>操作</th></tr></thead>
                <tbody>${tbody}</tbody>
            `;
        }

        function showScheduleModal(schedule = null) {
            document.getElementById('scheduleModalTitle').textContent = schedule ? '编辑日程' : '添加日程';
            document.getElementById('scheduleId').value = schedule ? schedule.id : '';
            document.getElementById('scheduleAnimeId').value = schedule ? schedule.animeId : '';
            document.getElementById('scheduleEpisode').value = schedule ? schedule.episode || 1 : 1;
            document.getElementById('scheduleAirTime').value = schedule && schedule.airTime ? schedule.airTime.replace(' ', 'T').substring(0, 16) : '';
            document.getElementById('schedulePlatform').value = schedule ? schedule.platform || '' : '';
            document.getElementById('schedulePlatformUrl').value = schedule ? schedule.platformUrl || '' : '';
            document.getElementById('scheduleModal').classList.add('active');
        }

        function editSchedule(schedule) {
            showScheduleModal(schedule);
        }

        async function saveSchedule() {
            const id = document.getElementById('scheduleId').value;
            const airTime = document.getElementById('scheduleAirTime').value;
            const data = {
                animeId: parseInt(document.getElementById('scheduleAnimeId').value),
                episode: parseInt(document.getElementById('scheduleEpisode').value) || 1,
                airTime: airTime ? airTime.replace('T', ' ') + ':00' : null,
                platform: document.getElementById('schedulePlatform').value,
                platformUrl: document.getElementById('schedulePlatformUrl').value
            };
            
            try {
                let res;
                if (id) {
                    res = await apiRequest('PUT', `/admin/schedule/${id}`, data);
                } else {
                    res = await apiRequest('POST', '/admin/schedule/create', data);
                }
                
                if (res.code === 200) {
                    showToast(id ? '更新成功' : '添加成功', 'success');
                    closeModal('scheduleModal');
                    loadSchedules(currentPage.schedule);
                } else {
                    showToast(res.message || '操作失败', 'error');
                }
            } catch (error) {
                showToast('操作失败', 'error');
            }
        }

        async function deleteSchedule(id) {
            if (!confirm('确定要删除这个日程吗？')) return;
            
            try {
                const res = await apiRequest('DELETE', `/admin/schedule/${id}`);
                if (res.code === 200) {
                    showToast('删除成功', 'success');
                    loadSchedules(currentPage.schedule);
                }
            } catch (error) {
                showToast('删除失败', 'error');
            }
        }

        // 评论管理
        async function loadReviews(page = 0) {
            currentPage.review = page;
            
            try {
                const res = await apiRequest('GET', `/admin/review/list?page=${page}&size=${pageSize}`);
                if (res.code === 200) {
                    renderReviewTable(res.data || []);
                    renderPagination('review', res.pages, res.currentPage);
                }
            } catch (error) {
                console.error('加载评论失败', error);
            }
        }

        function renderReviewTable(reviews) {
            const tbody = reviews.map(r => `
                <tr>
                    <td>${r.id}</td>
                    <td>用户ID: ${r.userId}</td>
                    <td>动漫ID: ${r.animeId}</td>
                    <td>⭐ ${r.rating || 0}</td>
                    <td>${(r.content || '').substring(0, 50)}${(r.content || '').length > 50 ? '...' : ''}</td>
                    <td>❤️ ${r.likeCount || 0}</td>
                    <td>${r.createTime ? new Date(r.createTime).toLocaleDateString() : '-'}</td>
                    <td>
                        <button class="btn btn-sm btn-danger" onclick="deleteReview(${r.id})">删除</button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('reviewTable').innerHTML = `
                <thead><tr><th>ID</th><th>用户</th><th>动漫</th><th>评分</th><th>内容</th><th>点赞</th><th>时间</th><th>操作</th></tr></thead>
                <tbody>${tbody}</tbody>
            `;
        }

        async function deleteReview(id) {
            if (!confirm('确定要删除这条评论吗？')) return;
            
            try {
                const res = await apiRequest('DELETE', `/admin/review/${id}`);
                if (res.code === 200) {
                    showToast('删除成功', 'success');
                    loadReviews(currentPage.review);
                }
            } catch (error) {
                showToast('删除失败', 'error');
            }
        }

        // 操作日志管理
        async function loadLogs(page = 0) {
            currentPage.log = page;
            
            try {
                const res = await apiRequest('GET', `/admin/log?page=${page}&size=${pageSize}`);
                if (res.code === 200) {
                    renderLogTable(res.data || []);
                    renderPagination('log', res.totalPages, res.page);
                }
            } catch (error) {
                console.error('加载日志失败', error);
            }
        }

        function renderLogTable(logs) {
            const operationTypeMap = {
                'CREATE': '➕ 创建',
                'UPDATE': '✏️ 更新',
                'DELETE': '🗑️ 删除',
                'LOGIN': '🔐 登录',
                'LOGOUT': '🚪 退出'
            };
            
            const tbody = logs.map(l => `
                <tr>
                    <td>${l.id}</td>
                    <td>${l.adminUsername || '系统'}</td>
                    <td><span class="status-tag ${l.operationType === 'DELETE' ? 'status-planned' : 'status-ongoing'}">${operationTypeMap[l.operationType] || l.operationType}</span></td>
                    <td>${l.module || '-'}</td>
                    <td>${(l.description || '').substring(0, 50)}${(l.description || '').length > 50 ? '...' : ''}</td>
                    <td>${l.ipAddress || '-'}</td>
                    <td>${l.createTime ? new Date(l.createTime).toLocaleString() : '-'}</td>
                </tr>
            `).join('');
            document.getElementById('logTable').innerHTML = `
                <thead><tr><th>ID</th><th>管理员</th><th>操作类型</th><th>模块</th><th>描述</th><th>IP</th><th>时间</th></tr></thead>
                <tbody>${tbody}</tbody>
            `;
        }

        async function deleteOldLogs() {
            if (!confirm('确定要清理30天前的操作日志吗？')) return;
            
            try {
                const res = await apiRequest('DELETE', '/admin/log/old');
                if (res.code === 200) {
                    showToast('清理成功', 'success');
                    loadLogs(currentPage.log);
                } else {
                    showToast(res.message || '清理失败', 'error');
                }
            } catch (error) {
                showToast('清理失败', 'error');
            }
        }

        // 分页渲染
        function renderPagination(type, totalPages, current) {
            let html = '';
            for (let i = 0; i < totalPages && i < 10; i++) {
                html += `<button class="${i === current ? 'active' : ''}" onclick="load${type.charAt(0).toUpperCase() + type.slice(1)}s(${i})">${i + 1}</button>`;
            }
            document.getElementById(`${type}Pagination`).innerHTML = html;
        }

        // 工具函数
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // 回车登录
        document.getElementById('loginPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
