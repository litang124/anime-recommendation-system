version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: anime-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: yzj2004430
      MYSQL_DATABASE: anime_recommend
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - anime-network
      
  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: anime-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - anime-network
    
  # Spring Boot应用
  app:
    build: .
    container_name: anime-app
    restart: always
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/anime_recommend?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: yzj2004430
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    ports:
      - "8080:8080"
    networks:
      - anime-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health/check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  anime-network:
    driver: bridge
